{{- /*
  Chart-rendered Secret from plain values. Only emitted when:
    - the user did NOT set dataSync.existingSecret, AND
    - the user DID set dataSync.username and dataSync.password.

  This is the "dev / test only" path — values land in `helm get values`
  in plaintext. For GitOps / production, use existingSecret or the
  SealedSecret template instead.
*/}}
{{- if and .Values.dataSync.enabled (not .Values.dataSync.existingSecret) .Values.dataSync.username .Values.dataSync.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kalseer.gitsyncSecretName" . }}
  labels:
    {{- include "kalseer.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.dataSync.username | quote }}
  password: {{ .Values.dataSync.password | quote }}
{{- end }}
