{{- /*
  SealedSecret rendered from kubeseal-encrypted values. Only emitted
  when:
    - the user did NOT set dataSync.existingSecret, AND
    - the user did NOT set plain dataSync.username/password, AND
    - BOTH dataSync.sealed.username and dataSync.sealed.password are
      populated.

  Requires the bitnami-labs/sealed-secrets controller in the cluster.
  The controller decrypts this into a native Secret with the same name.
*/}}
{{- if and
    .Values.dataSync.enabled
    (not .Values.dataSync.existingSecret)
    (not .Values.dataSync.username)
    .Values.dataSync.sealed.username
    .Values.dataSync.sealed.password -}}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ include "kalseer.gitsyncSecretName" . }}
  labels:
    {{- include "kalseer.labels" . | nindent 4 }}
spec:
  encryptedData:
    username: {{ .Values.dataSync.sealed.username | quote }}
    password: {{ .Values.dataSync.sealed.password | quote }}
  template:
    metadata:
      name: {{ include "kalseer.gitsyncSecretName" . }}
    type: Opaque
{{- end }}
