{{- /*
  Plain-value Secret for the git-sync SSH deploy key. DEV / TEST ONLY —
  see secret.yaml for the precedence rules (existingSecret > plain > sealed).
*/}}
{{- if and .Values.dataSync.enabled .Values.dataSync.ssh.enabled (not .Values.dataSync.ssh.existingSecret) .Values.dataSync.ssh.key }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kalseer.gitsyncSshSecretName" . }}
  labels:
    {{- include "kalseer.labels" . | nindent 4 }}
type: Opaque
stringData:
  ssh: |
    {{- .Values.dataSync.ssh.key | nindent 4 }}
{{- end }}
