{{- /*
  SealedSecret for the git-sync SSH deploy key (kubeseal-encrypted,
  --scope strict, name "<fullname>-gitsync-ssh" in the release
  namespace). Requires the bitnami-labs/sealed-secrets controller.
*/}}
{{- if and
    .Values.dataSync.enabled
    .Values.dataSync.ssh.enabled
    (not .Values.dataSync.ssh.existingSecret)
    (not .Values.dataSync.ssh.key)
    .Values.dataSync.ssh.sealed.key -}}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ include "kalseer.gitsyncSshSecretName" . }}
  labels:
    {{- include "kalseer.labels" . | nindent 4 }}
spec:
  encryptedData:
    ssh: {{ .Values.dataSync.ssh.sealed.key | quote }}
  template:
    metadata:
      name: {{ include "kalseer.gitsyncSshSecretName" . }}
    type: Opaque
{{- end }}
